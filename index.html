<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#F4EFE6" />
    <title>Study It</title>
    <!-- Favicon — editorial serif "S" on warm paper with gold accent. SVG so it scales from
         browser-tab size (16px) all the way up to Retina favicons (32px) and beyond. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS home screen icon (Safari ignores SVG for apple-touch — fallback to SVG anyway,
         iOS rasterizes it; not perfect but good enough until you want a real PNG bake) -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Meta description for search engines + link previews -->
    <meta name="description" content="An editorial AI study companion — flashcards, quizzes, explainers, mind maps, all grounded in your own sources." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; background: #FAF7F0; }
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
